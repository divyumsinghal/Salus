<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salus - Your Care Companion</title>
  <style>
    body { font-family: system-ui, sans-serif; background: linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; margin:0; padding:20px; }
    .card { background:#fff; border-radius:32px; padding:32px; max-width:560px; width:100%; box-shadow:0 20px 40px rgba(0,0,0,.25); text-align:center; }
    h1 { color:#333; margin-bottom:6px; }
    .sub { color:#777; margin-bottom:28px; font-size:15px; }
    .mic-btn { background:#ff5722; border:none; border-radius:100px; padding:20px 48px; font-size:22px; font-weight:700; color:#fff; cursor:pointer; transition:.2s; box-shadow:0 4px 16px rgba(0,0,0,.2); }
    .mic-btn:hover { background:#e64a19; transform:scale(1.03); }
    .mic-btn.listening { background:#f44336; animation:pulse 1.4s infinite; }
    .mic-btn:disabled { background:#aaa; cursor:not-allowed; transform:none; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    .status { margin:18px 0 0; font-size:15px; color:#555; min-height:24px; }
    .box { background:#f5f5f5; border-radius:16px; padding:16px; margin:16px 0; text-align:left; font-size:16px; min-height:60px; display:none; }
    .box.show { display:block; }
    .response-box { background:#e8f5e9; border-left:4px solid #4caf50; }
    .spinner { display:inline-block; width:16px; height:16px; border:3px solid #ddd; border-top-color:#ff5722; border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; margin-right:6px; }
    @keyframes spin { to{transform:rotate(360deg)} }
    /* text fallback */
    .text-row { display:flex; gap:8px; margin-top:16px; }
    input[type=text] { flex:1; padding:12px 14px; border:2px solid #ddd; border-radius:12px; font-size:15px; outline:none; }
    input[type=text]:focus { border-color:#764ba2; }
    .send-btn { background:#764ba2; color:#fff; border:none; border-radius:12px; padding:12px 20px; font-size:15px; font-weight:600; cursor:pointer; }
    .send-btn:disabled { background:#aaa; }
  </style>
</head>
<body>
<div class="card">
  <h1>🧠 Salus</h1>
  <div class="sub">Your caring AI companion</div>

  <button class="mic-btn" id="micBtn">🎤 Talk to Salus</button>
  <div class="status" id="status">Click the button and speak</div>

  <div class="box" id="transcript"></div>
  <div class="box response-box" id="response"></div>

  <div class="text-row">
    <input type="text" id="textIn" placeholder="Or type here...">
    <button class="send-btn" id="sendBtn">Send</button>
  </div>
</div>

<script>
const micBtn = document.getElementById('micBtn');
const status = document.getElementById('status');
const transcript = document.getElementById('transcript');
const response = document.getElementById('response');
const textIn = document.getElementById('textIn');
const sendBtn = document.getElementById('sendBtn');

function setLoading(on) {
  micBtn.disabled = on;
  sendBtn.disabled = on;
  textIn.disabled = on;
  if (on) status.innerHTML = '<span class="spinner"></span>Thinking...';
}

async function ask(prompt) {
  if (!prompt.trim()) return;
  transcript.textContent = '🗣️ You: ' + prompt;
  transcript.classList.add('show');
  response.classList.remove('show');
  setLoading(true);
  try {
    const res = await fetch('/api/prompt', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({prompt})
    });
    const data = await res.json();
    const reply = data.response || data.error || 'No response';
    response.textContent = '🧠 Salus: ' + reply;
    response.classList.add('show');
    status.textContent = '✅ Done — click to ask again';
    const utt = new SpeechSynthesisUtterance(reply);
    utt.lang = 'en-IE'; utt.rate = 0.9;
    speechSynthesis.cancel();
    speechSynthesis.speak(utt);
  } catch(e) {
    status.textContent = '❌ Error: ' + e.message;
  } finally {
    setLoading(false);
    micBtn.disabled = false;
    sendBtn.disabled = false;
    textIn.disabled = false;
  }
}

// Voice
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  const rec = new SR();
  rec.lang = 'en-IE'; rec.interimResults = false;
  rec.onstart = () => { micBtn.classList.add('listening'); status.textContent = '🔴 Listening...'; };
  rec.onend   = () => { micBtn.classList.remove('listening'); micBtn.disabled = false; };
  rec.onerror = e => { status.textContent = '❌ ' + e.error; };
  rec.onresult = e => ask(e.results[0][0].transcript);
  micBtn.addEventListener('click', () => { rec.start(); });
} else {
  micBtn.disabled = true;
  status.textContent = 'Voice not supported — use text input below';
}

// Text fallback
sendBtn.addEventListener('click', () => { ask(textIn.value); textIn.value = ''; });
textIn.addEventListener('keydown', e => { if (e.key==='Enter') { ask(textIn.value); textIn.value=''; } });
</script>
</body>
</html>
