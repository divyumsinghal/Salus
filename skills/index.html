<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salus - Your Care Companion</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 24px;
            padding: 36px 32px;
            max-width: 560px;
            width: 100%;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #111;
        }

        .header p {
            color: #777;
            margin-top: 4px;
            font-size: 15px;
        }

        .conversation {
            background: #f7f8fa;
            border-radius: 16px;
            padding: 16px;
            min-height: 120px;
            max-height: 320px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-size: 15px;
            line-height: 1.6;
        }

        .conversation:empty::before {
            content: "Ask Salus anything...";
            color: #bbb;
            font-style: italic;
        }

        .msg {
            margin-bottom: 12px;
        }

        .msg:last-child {
            margin-bottom: 0;
        }

        .msg-you {
            text-align: right;
        }

        .msg-you .bubble {
            display: inline-block;
            background: #0f3460;
            color: #fff;
            padding: 10px 16px;
            border-radius: 18px 18px 4px 18px;
            max-width: 85%;
        }

        .msg-salus .bubble {
            display: inline-block;
            background: #e8f4f8;
            color: #111;
            padding: 10px 16px;
            border-radius: 18px 18px 18px 4px;
            max-width: 85%;
            border-left: 3px solid #0f3460;
        }

        .msg-label {
            font-size: 11px;
            color: #999;
            margin-bottom: 3px;
        }

        .msg-you .msg-label {
            text-align: right;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        input[type="text"] {
            flex: 1;
            padding: 13px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #0f3460;
        }

        input[type="text"]:disabled {
            background: #f5f5f5;
        }

        .btn-send {
            background: #0f3460;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 13px 22px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .btn-send:hover {
            background: #1a4a8a;
        }

        .btn-send:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        .btn-voice {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px;
            background: #f0f0f0;
            color: #444;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-voice:hover {
            background: #e5e5e5;
        }

        .btn-voice:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-voice.listening {
            background: #fff0f0;
            border-color: #e53935;
            color: #e53935;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.01);
            }
        }

        .status {
            text-align: center;
            font-size: 13px;
            color: #999;
            min-height: 20px;
            margin-top: 10px;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #ddd;
            border-top-color: #0f3460;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="header">
            <h1>🧠 Salus</h1>
            <p>Your Care companion</p>
        </div>

        <div class="conversation" id="conversation"></div>

        <div class="input-row">
            <input type="text" id="textInput" placeholder="Type your question..." />
            <button class="btn-send" id="sendBtn">Send</button>
        </div>

        <button class="btn-voice" id="voiceBtn">🎤 Hold to Speak</button>

        <div class="status" id="status"></div>
    </div>

    <script>
        const conv = document.getElementById('conversation')
        const textInput = document.getElementById('textInput')
        const sendBtn = document.getElementById('sendBtn')
        const voiceBtn = document.getElementById('voiceBtn')
        const status = document.getElementById('status')

        function addMsg(role, text) {
            const msg = document.createElement('div')
            msg.className = `msg msg-${role}`
            const label = document.createElement('div')
            label.className = 'msg-label'
            label.textContent = role === 'you' ? 'You' : 'Salus'
            const bubble = document.createElement('div')
            bubble.className = 'bubble'
            bubble.textContent = text
            msg.appendChild(label)
            msg.appendChild(bubble)
            conv.appendChild(msg)
            conv.scrollTop = conv.scrollHeight
        }

        function setLoading(on) {
            sendBtn.disabled = on
            textInput.disabled = on
            voiceBtn.disabled = on
            status.innerHTML = on ? '<span class="spinner"></span>Thinking...' : ''
        }

        async function sendPrompt(prompt) {
            if (!prompt.trim()) return
            addMsg('you', prompt)
            setLoading(true)
            try {
                const res = await fetch('/api/prompt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                })
                const data = await res.json()
                const reply = data.response || data.error || 'Sorry, no response.'
                addMsg('salus', reply)
                // Text-to-speech
                const utt = new SpeechSynthesisUtterance(reply)
                utt.lang = 'en-GB'
                utt.rate = 0.88
                utt.pitch = 1.05
                const voices = window.speechSynthesis.getVoices()
                const preferred = ['Google UK English Female','Microsoft Sonia Online (Natural) - English (United Kingdom)','Microsoft Zira - English (United States)','Karen','Moira','Samantha','Victoria','Tessa']
                const femaleVoice = preferred.map(n => voices.find(v => v.name === n)).find(Boolean)
                    || voices.find(v => /female/i.test(v.name) && v.lang.startsWith('en'))
                    || voices.find(v => v.lang === 'en-GB')
                if (femaleVoice) utt.voice = femaleVoice
                window.speechSynthesis.cancel()
                window.speechSynthesis.speak(utt)
            } catch (err) {
                status.textContent = '❌ ' + err.message
            } finally {
                setLoading(false)
            }
        }

        // Text input
        sendBtn.addEventListener('click', () => {
            const val = textInput.value.trim()
            textInput.value = ''
            sendPrompt(val)
        })

        textInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault()
                const val = textInput.value.trim()
                textInput.value = ''
                sendPrompt(val)
            }
        })

        // Voice input
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition
        if (SpeechRecognition) {
            const rec = new SpeechRecognition()
            rec.lang = 'en-IE'
            rec.interimResults = false

            rec.onresult = (e) => {
                const text = e.results[0][0].transcript
                sendPrompt(text)
            }

            rec.onerror = (e) => {
                voiceBtn.classList.remove('listening')
                status.textContent = '❌ Voice error: ' + e.error
            }

            rec.onend = () => {
                voiceBtn.classList.remove('listening')
            }

            voiceBtn.addEventListener('click', () => {
                voiceBtn.classList.add('listening')
                voiceBtn.textContent = '🔴 Listening...'
                rec.start()
                voiceBtn.textContent = '🔴 Listening...'
            })

            rec.onend = () => {
                voiceBtn.classList.remove('listening')
                voiceBtn.textContent = '🎤 Hold to Speak'
            }
        } else {
            voiceBtn.disabled = true
            voiceBtn.textContent = '🎤 Voice not supported (use text)'
        }
    </script>
</body>

</html>
